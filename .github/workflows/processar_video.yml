name: Processar Vídeos Supabase

on:
  schedule:
    - cron: "*/10 * * * *" # Roda a cada 10 minutos automaticamente
  workflow_dispatch: # Permite rodar manualmente clicando num botão no GitHub

jobs:
  video-processing:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout do código
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Instalar FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Instalar Dependências Python
      run: |
        pip install supabase tuspy

    - name: Executar Robô Worker
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python worker.py
